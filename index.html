<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc ngủ ngon 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at bottom, #1a1a40, #000);
}

/* SAO TRỜI */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; transform: scale(1.5); }
}

/* Nội dung */
.container {
    text-align: center;
    z-index: 2;
}

/* Gấu */
.bear img {
    width: 200px;
    cursor: pointer;
    animation: float 2s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,200,255,0.6));
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h1 {
    color: #fff;
    font-size: 36px;
}

.name {
    font-size: 26px;
    color: #ffd6f0;
}

.message {
    color: #fff;
}

/* Tim */
.heart {
    position: absolute;
    font-size: 22px;
    animation: explode 2s ease-out forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- SAO -->
<div class="stars" id="stars"></div>

<!-- NHẠC -->
<audio id="bg-music" loop>
    <source src="0409.MP3">
</audio>

<div class="container">
    <div class="bear" onclick="shootHeart()">
        <img src="gau cute.png">
    </div>

    <h1> em ngủ ngoan 💖</h1>
    <div class="name">Bấm dô bé gấu 💕</div>
    <div class="message">Mơ đẹp nhé 🌙✨</div>
</div>

<script>
/* SAO */
const starContainer = document.getElementById("stars");
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (Math.random() * 2 + 1) + "s";
    starContainer.appendChild(star);
}

/* TIM */
function shootHeart() {
    for (let i = 0; i < 15; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";

        let x = (Math.random() - 0.5) * 400 + "px";
        let y = (Math.random() - 1) * 400 + "px";

        heart.style.setProperty('--x', x);
        heart.style.setProperty('--y', y);

        heart.style.left = (window.innerWidth / 2) + "px";
        heart.style.top = (window.innerHeight / 2) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 2000);
    }
}

/* NHẠC AUTO */
window.addEventListener("click", () => {
    const music = document.getElementById("bg-music");
    music.play();
}, { once: true });
</script>

</body>
</html>
