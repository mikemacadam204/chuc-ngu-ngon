<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Heart Explosion</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let explosionParticles = [];
let showText = false;

// Hàm trái tim
function heartShape(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return {x, y};
}

// Hạt trái tim
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.size = Math.random() * 2;
    }

    update() {
        // hiệu ứng rung nhẹ
        this.x = this.baseX + Math.sin(Date.now()/300 + this.baseY) * 2;
        this.y = this.baseY + Math.cos(Date.now()/300 + this.baseX) * 2;
    }

    draw() {
        ctx.fillStyle = "rgba(255,100,150,0.9)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Hạt nổ
class Explosion {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speedX = (Math.random() - 0.5) * 8;
        this.speedY = (Math.random() - 0.5) * 8;
        this.life = 100;
        this.size = Math.random() * 3;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life--;
    }

    draw() {
        ctx.fillStyle = "rgba(255,150,200," + this.life/100 + ")";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// tạo trái tim
function init() {
    particles = [];
    for (let i = 0; i < 2000; i++) {
        let t = Math.random() * Math.PI * 2;
        let pos = heartShape(t);

        let x = canvas.width / 2 + pos.x * 15;
        let y = canvas.height / 2 + pos.y * 15;

        particles.push(new Particle(x, y));
    }
}

// click để nổ
canvas.addEventListener("click", () => {
    explosionParticles = [];

    particles.forEach(p => {
        for (let i = 0; i < 2; i++) {
            explosionParticles.push(new Explosion(p.x, p.y));
        }
    });

    particles = [];
    showText = true;
});

// vẽ chữ
function drawText() {
    ctx.font = "bold 60px Arial";
    ctx.fillStyle = "pink";
    ctx.textAlign = "center";
    ctx.fillText("I LOVE YOU", canvas.width/2, canvas.height/2);
}

// animate
function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    explosionParticles.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.life <= 0) {explosionParticles.splice(index, 1);
        }
    });

    if (showText) drawText();

    requestAnimationFrame(animate);
}

init();
animate();
</script>
</body>
</html>
